<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Unimontes Campus Almenara</title>
    <script>
      // Redireciona para index.html preservando o caminho como query string
      var segmentsToKeep = 1; // número de segmentos do base path (/siteunimontes)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
