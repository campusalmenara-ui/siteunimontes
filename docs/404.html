<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Unimontes Campus Almenara</title>
    <script>
      var pathSegments = window.location.pathname.split('/');
      // Mantém apenas o segmento base: /siteunimontes
      var base = '/' + pathSegments[1];
      var rest = pathSegments.slice(2).join('/');
      var redirectUrl = window.location.protocol + '//' + window.location.hostname +
        (window.location.port ? ':' + window.location.port : '') +
        base + '/?p=/' + rest +
        (window.location.search ? '&q=' + window.location.search.slice(1) : '') +
        window.location.hash;
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
