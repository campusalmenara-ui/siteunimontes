<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionando...</title>
  <script>
    // Redirecionar 404s para index.html com a rota preservada
    const path = window.location.pathname.replace(/\/$/, '');
    if (path && !path.includes('.')) {
      // Preservar a rota como hash para o React Router
      window.location.replace('/siteunimontes/#' + path.replace('/siteunimontes', ''));
    }
  </script>
</head>
<body>
  Redirecionando...
</body>
</html>
